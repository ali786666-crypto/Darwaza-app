<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darwaza Premium</title>
    <!-- FontAwesome & Google Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- MQTT for Real-time Connection -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        /* Force Mobile Portrait Layout */
        body { 
            background: #000; color: var(--text-main); 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden; margin: 0;
        }

        .app-container {
            width: 100%; max-width: 430px; height: 100dvh; 
            background: var(--bg-dark); display: flex; flex-direction: column; 
            position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Screens Management */
        .screen { display: flex; flex-direction: column; height: 100%; width: 100%; flex: 1; overflow: hidden; background: var(--bg-dark); }
        .hidden { display: none !important; }

        /* HEADER */
        .header { padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--bg-panel); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); }
        .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }

        /* SCROLLABLE CONTENT */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 40px; scrollbar-width: none; }
        
        /* TABS */
        .tabs { display: flex; background: rgba(0,0,0,0.5); border-radius: 10px; margin-bottom: 20px; padding: 5px; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* DOORS UI */
        .doors-grid { display: flex; flex-direction: column; gap: 15px; }
        .door-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: flex; align-items: center; gap: 12px; }
        .door-icon-box { width: 45px; height: 45px; background: rgba(59, 130, 246, 0.1); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: var(--primary); flex-shrink: 0;}
        .door-info { flex: 1; overflow: hidden; }
        .door-info h3 { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .door-qr { width: 50px; height: 50px; border-radius: 8px; background: white; padding: 4px; flex-shrink: 0;}
        .del-btn { color: var(--danger); background: none; border: none; font-size: 16px; padding: 10px; flex-shrink: 0;}

        /* HISTORY UI */
        .history-item { background: var(--bg-panel); border-left: 4px solid var(--primary); padding: 12px; border-radius: 12px; margin-bottom: 12px; display: flex; gap: 12px; align-items: center; }
        .history-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; flex-shrink: 0;}
        .history-info { flex: 1; overflow: hidden; }
        .history-info h4 { font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-info p { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-time { font-size: 10px; color: var(--text-muted); text-align: right; flex-shrink: 0;}

        /* FORM ELEMENTS */
        .input-group { margin-bottom: 15px; width: 100%; }
        input, select { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 600; font-size: 15px; display: flex; justify-content: center; align-items: center; gap: 8px; flex-shrink: 0; color: white; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }

        /* CAMERA */
        .camera-box { width: 100%; height: 220px; border-radius: 16px; background: #000; margin-bottom: 20px; overflow: hidden; position: relative; border: 2px solid var(--border); flex-shrink: 0;}
        video, canvas { width: 100%; height: 100%; object-fit: cover; }

        /* MODALS (Full Screen Overlay) */
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal.active { opacity: 1; pointer-events: all; }
        .modal-box { background: var(--bg-panel); width: 100%; max-width: 340px; padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        
        /* PULSE ANIMATION */
        .pulse-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--primary); object-fit: cover; animation: pulseRing 1.5s infinite; margin-bottom: 15px; }
        @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        /* NEW COMPACT CALL BUTTONS FOR MOBILE */
        .call-btn-container { display: flex; gap: 15px; width: 100%; justify-content: center; margin-top: 25px; }
        .btn-call { flex: 1; max-width: 140px; padding: 12px 10px; border-radius: 50px; font-size: 15px; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 8px; border: none; color: white; cursor: pointer; }
        .btn-call.ignore { background: var(--danger); }
        .btn-call.answer { background: var(--success); }

        /* CHAT SCREEN */
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: var(--bg-dark); }
        .msg-sys { text-align: center; font-size: 12px; color: var(--success); background: rgba(16, 185, 129, 0.1); padding: 5px 15px; border-radius: 20px; align-self: center; }
        .msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg-mine { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-theirs { background: var(--bg-panel); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; opacity: 0.6; display: block; text-align: right; margin-top: 4px; }
        
        .chat-input-area { padding: 10px 15px; background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; flex-shrink: 0; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .chat-input-area input { flex: 1; padding: 12px 15px; border-radius: 25px; margin: 0; background: rgba(0,0,0,0.5); font-size: 14px;}
        .action-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 18px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .action-btn.recording { background: var(--danger); animation: pulseRing 1s infinite; }
        audio { height: 35px; max-width: 200px; outline: none; }
    </style>
</head>
<body>

<div class="app-container">

    <!-- ===================================== -->
    <!-- SCREEN 1: OWNER DASHBOARD             -->
    <!-- ===================================== -->
    <div id="screen-owner" class="screen hidden">
        <div class="header">
            <h1><i class="fa-solid fa-house-user"></i> My Home</h1>
            <div style="font-size: 12px; display: flex; align-items: center; gap:5px;"><span id="conn-status-owner" class="status-dot"></span> Online</div>
        </div>
        
        <div class="content">
            <div class="tabs">
                <div class="tab-btn active" onclick="switchTab('doors')">Doors</div>
                <div class="tab-btn" onclick="switchTab('history')">History</div>
            </div>

            <div id="tab-doors">
                <div class="doors-grid" id="doors-container"></div>
                <button class="btn btn-primary" style="margin-top: 20px;" onclick="document.getElementById('add-door-modal').classList.add('active')">
                    <i class="fa-solid fa-plus"></i> Add New Door
                </button>
            </div>

            <div id="tab-history" class="hidden">
                <div id="history-container">
                    <p style="text-align:center; color: var(--text-muted); margin-top: 20px;">No history available.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===================================== -->
    <!-- SCREEN 2: VISITOR ENTRY               -->
    <!-- ===================================== -->
    <div id="screen-visitor" class="screen hidden">
        <div class="header">
            <h1><i class="fa-solid fa-bell"></i> Doorbell</h1>
            <div style="font-size: 12px; display: flex; align-items: center; gap:5px;"><span id="conn-status-visitor" class="status-dot"></span> Connected</div>
        </div>
        
        <div class="content">
            <div style="text-align: center; margin-bottom: 15px;">
                <p style="color: var(--text-muted); font-size: 13px;">You are ringing</p>
                <h2 id="visit-door-name" style="color: var(--primary); font-size: 22px;">Front Door</h2>
            </div>

            <div class="camera-box">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="canvas" class="hidden"></canvas>
            </div>

            <div class="input-group">
                <input type="text" id="v-name" placeholder="Your Name" required>
            </div>
            <div class="input-group">
                <input type="text" id="v-msg" placeholder="Short Message (e.g. Courier)">
            </div>
            
            <button class="btn btn-primary" id="btn-ring" onclick="sendRing()">
                <i class="fa-solid fa-bell"></i> Ring Bell
            </button>
        </div>
    </div>

    <!-- ===================================== -->
    <!-- SCREEN 3: LIVE CHAT (Shared)          -->
    <!-- ===================================== -->
    <div id="screen-chat" class="screen hidden">
        <div class="header">
            <button onclick="endChat()" style="background:none; border:none; color:var(--danger); font-size: 20px; padding: 5px;"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 id="chat-title" style="font-size: 16px; text-align: center; flex: 1;">Live Chat</h1>
            <img id="chat-avatar" src="" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; display: none;">
        </div>
        
        <div class="chat-messages" id="chat-box"></div>

        <div class="chat-input-area">
            <button class="action-btn" id="mic-btn" onmousedown="startMic()" onmouseup="stopMic()" ontouchstart="startMic()" ontouchend="stopMic()">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <input type="text" id="chat-input" placeholder="Type message...">
            <button class="action-btn" onclick="sendText()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- ===================================== -->
    <!-- MODALS                                -->
    <!-- ===================================== -->
    
    <!-- Add Door Modal -->
    <div id="add-door-modal" class="modal">
        <div class="modal-box">
            <h2 style="margin-bottom: 20px; font-size: 18px;">Create Door</h2>
            <div class="input-group"><input type="text" id="door-name" placeholder="Door Name (e.g. Office)"></div>
            <div class="input-group">
                <select id="door-icon">
                    <option value="fa-door-closed">🚪 Solid Door</option>
                    <option value="fa-building">🏢 Building</option>
                    <option value="fa-house">🏠 House</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-danger" onclick="document.getElementById('add-door-modal').classList.remove('active')">Cancel</button>
                <button class="btn btn-success" onclick="saveDoor()">Save</button>
            </div>
        </div>
    </div>

    <!-- Incoming Ring Modal (Owner) -->
    <div id="incoming-modal" class="modal">
        <div style="text-align: center; width: 100%; max-width: 320px;">
            <h3 style="color: var(--primary); margin-bottom: 5px; font-size: 16px;" id="alert-door-name">Door</h3>
            <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 14px;">Someone is ringing!</p>
            
            <img id="alert-photo" src="" class="pulse-avatar">
            <h2 id="alert-name" style="font-size: 22px;">Visitor Name</h2>
            <p id="alert-msg" style="font-size: 15px; margin: 15px 0; background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 12px; display: inline-block;">"Msg"</p>
            
            <!-- Beautiful Mobile Call Buttons -->
            <div class="call-btn-container">
                <button class="btn-call ignore" onclick="ignoreRing()"><i class="fa-solid fa-xmark"></i> Ignore</button>
                <button class="btn-call answer" onclick="acceptRing()"><i class="fa-solid fa-phone"></i> Answer</button>
            </div>
        </div>
    </div>

</div>

<script>
    /* =========================================================================
       CORE SETUP & MQTT
       ========================================================================= */
    const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt'); 
    let ownerId = localStorage.getItem('dwz_owner_id');
    let myRole = ''; 
    let currentSessionId = null;
    let targetOwnerId = null;
    let audioCtx, ringInterval;
    let mediaRecorder, audioChunks = [];
    let videoStream = null;

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
    }

    // INIT APP BASED ON URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('visit')) {
        myRole = 'visitor';
        targetOwnerId = urlParams.get('visit');
        document.getElementById('visit-door-name').innerText = decodeURIComponent(urlParams.get('dname') || 'The Door');
        showScreen('screen-visitor');
        initCamera();
    } else {
        myRole = 'owner';
        if(!ownerId) { ownerId = 'own_' + Date.now(); localStorage.setItem('dwz_owner_id', ownerId); }
        showScreen('screen-owner');
        renderDoors();
        renderHistory();
    }

    // MQTT HANDLERS
    mqttClient.on('connect', () => {
        document.querySelectorAll('.status-dot').forEach(d => d.classList.add('online'));
        if (myRole === 'owner') mqttClient.subscribe(`dwz/ring/${ownerId}`);
    });

    mqttClient.on('message', (topic, message) => {
        const data = JSON.parse(message.toString());
        
        if (myRole === 'owner' && topic === `dwz/ring/${ownerId}`) {
            handleIncomingRing(data);
        }
        
        if (currentSessionId && topic === `dwz/chat/${currentSessionId}`) {
            if(data.type === 'system') appendSystemMsg(data.text);
            else if(data.type === 'end') handleChatEnded();
            else appendChatBubble(data);
        }
    });

    /* =====================================
       HOMEOWNER: DOORS & HISTORY
       ===================================== */
    function switchTab(tab) {
        document.getElementById('tab-doors').classList.add('hidden');
        document.getElementById('tab-history').classList.add('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.remove('hidden');
        event.target.classList.add('active');
    }

    function saveDoor() {
        const name = document.getElementById('door-name').value;
        const icon = document.getElementById('door-icon').value;
        if(!name) return alert("Enter door name");

        let doors = JSON.parse(localStorage.getItem('dwz_doors') || '[]');
        const doorId = 'dr_' + Date.now();
        const link = `${window.location.href.split('?')[0]}?visit=${ownerId}&door=${doorId}&dname=${encodeURIComponent(name)}`;
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}`;

        doors.push({ id: doorId, name, icon, link, qrUrl });
        localStorage.setItem('dwz_doors', JSON.stringify(doors));
        
        document.getElementById('add-door-modal').classList.remove('active');
        document.getElementById('door-name').value = '';
        renderDoors();
    }

    function renderDoors() {
        let doors = JSON.parse(localStorage.getItem('dwz_doors') || '[]');
        document.getElementById('doors-container').innerHTML = doors.map(door => `
            <div class="door-card">
                <div class="door-icon-box"><i class="fa-solid ${door.icon}"></i></div>
                <div class="door-info">
                    <h3>${door.name}</h3>
                    <p style="font-size: 11px; color: gray;">Scan QR to ring</p>
                </div>
                <a href="${door.link}" target="_blank"><img src="${door.qrUrl}" class="door-qr"></a>
                <button class="del-btn" onclick="deleteDoor('${door.id}')"><i class="fa-solid fa-trash"></i></button>
            </div>
        `).join('');
    }

    function deleteDoor(id) {
        let doors = JSON.parse(localStorage.getItem('dwz_doors') || '[]');
        localStorage.setItem('dwz_doors', JSON.stringify(doors.filter(d => d.id !== id)));
        renderDoors();
    }

    function saveHistory(data) {
        let history = JSON.parse(localStorage.getItem('dwz_history') || '[]');
        history.unshift({ name: data.vName, msg: data.msg, photo: data.photo, door: data.doorName, time: new Date().toLocaleString() });
        if(history.length > 20) history.pop();
        localStorage.setItem('dwz_history', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        let history = JSON.parse(localStorage.getItem('dwz_history') || '[]');
        const container = document.getElementById('history-container');
        if(history.length === 0) return;
        container.innerHTML = history.map(h => `
            <div class="history-item">
                <img src="${h.photo}" class="history-img">
                <div class="history-info">
                    <h4>${h.name} <span style="font-size:10px; color:var(--primary);">(${h.door})</span></h4>
                    <p>${h.msg}</p>
                </div>
                <div class="history-time">${h.time.split(', ')[0]}<br>${h.time.split(', ')[1]}</div>
            </div>
        `).join('');
    }

    /* =====================================
       VISITOR LOGIC
       ===================================== */
    async function initCamera() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
            document.getElementById('video').srcObject = videoStream;
        } catch(err) { alert("Camera & Mic required."); }
    }

    function sendRing() {
        const name = document.getElementById('v-name').value;
        const msg = document.getElementById('v-msg').value || "Someone is at the door";
        if(!name) return alert("Enter your name");

        // Capture Photo
        const canvas = document.getElementById('canvas');
        canvas.width = 150; canvas.height = 150;
        canvas.getContext('2d').drawImage(document.getElementById('video'), 0, 0, 150, 150);
        const photo = canvas.toDataURL('image/jpeg', 0.5);

        if(videoStream) videoStream.getTracks().forEach(t => t.stop());

        currentSessionId = 'sess_' + Date.now();
        const payload = { sessionId: currentSessionId, doorName: document.getElementById('visit-door-name').innerText, vName: name, msg: msg, photo: photo };

        mqttClient.publish(`dwz/ring/${targetOwnerId}`, JSON.stringify(payload));
        
        setupChatMedia(); // Setup mic for later
        mqttClient.subscribe(`dwz/chat/${currentSessionId}`);
        document.getElementById('chat-title').innerText = "Waiting for Owner...";
        document.getElementById('chat-box').innerHTML = ''; // Clear chat
        showScreen('screen-chat');
        appendSystemMsg("Ringing... waiting for homeowner.");
        appendChatBubble({ sender: 'visitor', type: 'text', content: msg, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
    }

    /* =====================================
       OWNER RINGING LOGIC
       ===================================== */
    let incomingData = null;

    function playRingtone() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const playTone = () => {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        };
        playTone(); ringInterval = setInterval(playTone, 2000);
    }

    function handleIncomingRing(data) {
        incomingData = data;
        document.getElementById('alert-door-name').innerText = data.doorName;
        document.getElementById('alert-name').innerText = data.vName;
        document.getElementById('alert-msg').innerText = `"${data.msg}"`;
        document.getElementById('alert-photo').src = data.photo;
        
        saveHistory(data);
        document.getElementById('incoming-modal').classList.add('active');
        playRingtone();
    }

    function ignoreRing() {
        clearInterval(ringInterval);
        document.getElementById('incoming-modal').classList.remove('active');
        mqttClient.publish(`dwz/chat/${incomingData.sessionId}`, JSON.stringify({ type: 'end' }));
    }

    function acceptRing() {
        clearInterval(ringInterval);
        document.getElementById('incoming-modal').classList.remove('active');
        currentSessionId = incomingData.sessionId;
        
        // 1. SHOW UI IMMEDIATELY (Fixes the issue where it doesn't show)
        document.getElementById('chat-title').innerText = incomingData.vName;
        document.getElementById('chat-avatar').src = incomingData.photo;
        document.getElementById('chat-avatar').style.display = 'block';
        document.getElementById('chat-box').innerHTML = ''; 
        appendChatBubble({ sender: 'visitor', type: 'text', content: incomingData.msg, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
        showScreen('screen-chat');

        // 2. DO NETWORK / MIC IN BACKGROUND
        setupChatMedia();
        mqttClient.subscribe(`dwz/chat/${currentSessionId}`);
        mqttClient.publish(`dwz/chat/${currentSessionId}`, JSON.stringify({ type: 'system', text: 'Homeowner joined the chat!' }));
    }

    /* =====================================
       CHAT LOGIC (TEXT & AUDIO)
       ===================================== */
    function setupChatMedia() {
        if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const reader = new FileReader();
                    reader.readAsDataURL(new Blob(audioChunks, { type: 'audio/webm' }));
                    reader.onloadend = () => {
                        mqttClient.publish(`dwz/chat/${currentSessionId}`, JSON.stringify({
                            sender: myRole, type: 'audio', content: reader.result, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
                        }));
                    };
                };
            }).catch(err => console.log("Mic access not granted."));
        }
    }

    function sendText() {
        const input = document.getElementById('chat-input');
        if(!input.value.trim() || !currentSessionId) return;
        mqttClient.publish(`dwz/chat/${currentSessionId}`, JSON.stringify({
            sender: myRole, type: 'text', content: input.value, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
        }));
        input.value = '';
    }

    function startMic() { if(mediaRecorder) { audioChunks = []; mediaRecorder.start(); document.getElementById('mic-btn').classList.add('recording'); } }
    function stopMic() { if(mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); document.getElementById('mic-btn').classList.remove('recording'); } }

    function appendSystemMsg(text) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg-sys">${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function appendChatBubble(data) {
        const box = document.getElementById('chat-box');
        const isMine = data.sender === myRole;
        const htmlContent = data.type === 'text' ? data.content : `<audio controls src="${data.content}"></audio>`;
        
        box.innerHTML += `
            <div class="msg-bubble ${isMine ? 'msg-mine' : 'msg-theirs'}">
                ${htmlContent}
                <span class="msg-time">${data.time}</span>
            </div>
        `;
        box.scrollTop = box.scrollHeight;
    }

    function endChat() {
        mqttClient.publish(`dwz/chat/${currentSessionId}`, JSON.stringify({ type: 'end' }));
        handleChatEnded();
    }

    function handleChatEnded() {
        if(currentSessionId) mqttClient.unsubscribe(`dwz/chat/${currentSessionId}`);
        currentSessionId = null;
        document.getElementById('chat-box').innerHTML = ''; 
        document.getElementById('chat-avatar').style.display = 'none';
        
        if(myRole === 'owner') showScreen('screen-owner');
        else document.getElementById('screen-chat').innerHTML = `<div style="text-align:center; margin-top:50%; color:gray;"><h3 style="margin-bottom:10px;">Chat Ended</h3><p>You may close this browser tab.</p></div>`;
    }

</script>
</body>
</html>
